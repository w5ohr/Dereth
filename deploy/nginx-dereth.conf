# Dereth — nginx site. Serves the static game client and proxies the /ws WebSocket
# endpoint to the local Python game server. Run `certbot --nginx` afterwards to add
# the TLS (443) server block + HTTP->HTTPS redirect automatically.
#
#   sudo cp deploy/nginx-dereth.conf /etc/nginx/sites-available/dereth
#   sudo ln -s /etc/nginx/sites-available/dereth /etc/nginx/sites-enabled/dereth
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name dereth.example.com;          # <-- replace with your domain

    root /opt/dereth;                         # serves index.html + three.min.js
    index index.html;

    # never serve server source, deploy scripts, or the git dir as static files
    location ~ ^/(server|deploy|\.git)/ { deny all; }

    # WebSocket endpoint -> Python game server (client connects to wss://<host>/ws)
    location /ws {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;             # long-lived game connections
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
